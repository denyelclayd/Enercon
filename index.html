<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AC ENERCON — LINK</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:ital,wght@0,300;0,400;0,600;0,800;1,800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #07090f;
      --surface:   #0c1018;
      --card:      #111620;
      --card-alt:  #161c28;
      --border:    #1c2438;
      --border-hi: #263040;
      --cyan:      #00d4ff;
      --cyan-dim:  rgba(0,212,255,0.12);
      --cyan-glow: rgba(0,212,255,0.25);
      --green:     #00e5a0;
      --green-dim: rgba(0,229,160,0.08);
      --green-glow:rgba(0,229,160,0.2);
      --amber:     #ffb800;
      --amber-dim: rgba(255,184,0,0.08);
      --red:       #ff4560;
      --red-dim:   rgba(255,69,96,0.1);
      --txt1:      #dde6f0;
      --txt2:      #6b8099;
      --txt3:      #2e3d52;
    }
    html, body { height: 100%; background: var(--bg); color: var(--txt1); font-family: 'Rajdhani', sans-serif; }
    body::before {
      content: ''; pointer-events: none; position: fixed; inset: 0; z-index: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
    }
    body::after {
      content: ''; pointer-events: none; position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 44px 44px; opacity: 0.35;
    }
    #root { position: relative; z-index: 1; min-height: 100vh; padding: 20px 16px 40px; max-width: 1300px; margin: 0 auto; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }
    .f-mono { font-family: 'Share Tech Mono', monospace; }
    .f-disp { font-family: 'Exo 2', sans-serif; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
    .card  { background: var(--card);    border: 1px solid var(--border); border-radius: 10px; }
    .field {
      background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
      padding: 8px 11px; font-family: 'Rajdhani', sans-serif; font-size: 13px;
      font-weight: 500; color: var(--txt1); outline: none; width: 100%;
      transition: border-color .15s, box-shadow .15s;
    }
    .field:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,212,255,0.12); }
    .field::placeholder { color: var(--txt3); }
    select.field option { background: var(--card); }
    .stepper { display: flex; align-items: center; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; overflow: hidden; transition: border-color .15s, box-shadow .15s; }
    .stepper:focus-within { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,212,255,0.12); }
    .step-btn { width: 30px; height: 34px; background: transparent; border: none; cursor: pointer; color: var(--txt2); font-size: 17px; font-weight: 700; display: flex; align-items: center; justify-content: center; transition: color .12s, background .12s; flex-shrink: 0; }
    .step-btn:hover { color: var(--cyan); background: var(--cyan-dim); }
    .step-btn:active { transform: scale(0.88); }
    .step-input { width: 36px; height: 34px; background: transparent; border: none; outline: none; font-family: 'Share Tech Mono', monospace; font-size: 14px; color: var(--cyan); text-align: center; -moz-appearance: textfield; }
    .step-input::-webkit-inner-spin-button, .step-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .btn { border: none; border-radius: 7px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: .1em; text-transform: uppercase; padding: 8px 14px; transition: all .15s; white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; }
    .btn:active { transform: scale(0.96); }
    .btn-cyan  { background: var(--cyan); color: #000; }
    .btn-cyan:hover  { background: #33dcff; box-shadow: 0 0 18px var(--cyan-glow); }
    .btn-green { background: var(--green); color: #000; }
    .btn-green:hover { background: #33ebb4; box-shadow: 0 0 18px var(--green-glow); }
    .btn-ghost { background: transparent; color: var(--txt2); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border-hi); color: var(--txt1); }
    .btn-icon { background: var(--card); border: 1px solid var(--border); color: var(--txt2); width: 32px; height: 32px; padding: 0; border-radius: 7px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; }
    .btn-icon:hover { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); }
    .btn-icon.del:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }
    .badge { display: inline-flex; align-items: center; gap: 4px; border-radius: 5px; padding: 2px 8px; font-family: 'Share Tech Mono', monospace; font-size: 11px; }
    .badge-cyan  { background: var(--cyan-dim);  color: var(--cyan);  border: 1px solid rgba(0,212,255,.2); }
    .badge-green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,229,160,.18); }
    .badge-amber { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(255,184,0,.2); }
    .badge-red   { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(255,69,96,.2); }
    .log-row { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; display: flex; align-items: center; gap: 12px; transition: border-color .15s, background .15s; }
    .log-row:hover { border-color: var(--border-hi); background: var(--card-alt); }
    .log-row.editing { border-color: var(--cyan); background: var(--card-alt); }
    .energy-panel { background: linear-gradient(135deg, #071410 0%, #0c1018 70%); border: 1px solid rgba(0,229,160,.22); border-radius: 12px; padding: 18px; position: relative; overflow: hidden; }
    .energy-panel::before { content: ''; position: absolute; top: -50px; right: -50px; width: 160px; height: 160px; background: radial-gradient(circle, rgba(0,229,160,.13) 0%, transparent 70%); pointer-events: none; }
    .ebar-track { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; height: 6px; overflow: hidden; }
    .ebar-fill  { height: 100%; border-radius: 5px; background: linear-gradient(90deg, #00996a, var(--green)); transition: width .65s cubic-bezier(.34,1.3,.64,1); box-shadow: 0 0 8px rgba(0,229,160,.5); }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 7px; cursor: pointer; font-size: 12px; color: var(--txt2); transition: background .13s, color .13s; }
    .cal-day:hover { background: var(--card-alt); color: var(--txt1); }
    .cal-day.sel  { background: var(--cyan); color: #000; font-weight: 700; box-shadow: 0 0 14px var(--cyan-glow); }
    .cal-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 2px; background: var(--cyan); }
    .cal-day.sel .cal-dot { background: rgba(0,0,0,.5); }
    .accent-bar { height: 2px; background: linear-gradient(90deg, var(--cyan), transparent); border-radius: 1px; }
    .status-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--green-dim); border: 1px solid rgba(0,229,160,.18); color: var(--green); border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; }
    .dot-pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 13px 15px; }
    .edit-bar { background: var(--cyan-dim); border: 1px solid rgba(0,212,255,.2); border-radius: 8px; padding: 7px 12px; display: flex; align-items: center; gap: 8px; animation: fadeSlide .15s ease; }
    @keyframes fadeSlide { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .spin { animation: spin 1s linear infinite; }
    .fade-in { animation: fadeSlide .2s ease both; }
    .tab { padding: 5px 12px; border-radius: 6px; border: 1px solid transparent; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--txt3); background: transparent; transition: all .15s; }
    .tab:hover { color: var(--txt2); border-color: var(--border); background: var(--card); }
    .tab.on { color: var(--cyan); border-color: rgba(0,212,255,.3); background: var(--cyan-dim); }
    .form-grid { display: grid; grid-template-columns: 90px 1fr 80px 1fr 1fr 1fr 80px; gap: 7px; align-items: center; }
    @media(max-width:900px) { .form-grid { grid-template-columns: 1fr 1fr; } }
    @keyframes shimmer { 0%{opacity:.4} 50%{opacity:1} 100%{opacity:.4} }
    .shimmer { animation: shimmer 1.2s ease infinite; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useMemo } = React;

  const AC_WATTS     = 1471;              // watts per AC unit (assumed) @2HP
  const AC_HRS       = 3;               // hours off per log entry
  const KWH_PER_UNIT = (AC_WATTS * AC_HRS) / 1000;  // = 6.71 kWhr
  const PHP_KWH      = 15;
  const FLOORS       = ['8F','9F','10F','11F','14F','15F'];

  // ─────────────────────────────────────────────────────────────────────
  //  PASTE YOUR APPS SCRIPT WEB APP URL BELOW (replace the empty string)
  //  Each copy of this HTML file gets its own unique URL pasted here.
  // ─────────────────────────────────────────────────────────────────────
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyciEa5gfI8FIlpQv6IVN2v9kNurctVNTGtYRkIvfF7iLU7KUghwgvLfvVCobi0OI2u/exec';   // ← paste your URL here

  // Cache key derived from URL so two files never share localStorage data
  const CACHE_KEY = 'ac_cache_' + (APPS_SCRIPT_URL ? btoa(APPS_SCRIPT_URL).slice(-12) : 'default');

  const f2      = n => (+n).toFixed(2);
  const fP      = n => `₱${(+n).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  const fT      = (t,h) => { const [hh,mm]=(t||'00:00').split(':').map(Number); return `${String((hh+h)%24).padStart(2,'0')}:${String(mm||0).padStart(2,'0')}`; };
  const dateKey = d => { const y=d.getFullYear(),mo=(d.getMonth()+1).toString().padStart(2,'0'),dd=d.getDate().toString().padStart(2,'0'); return `${y}-${mo}-${dd}`; };
  const sumU    = arr => arr.reduce((s,l)=>s+(parseInt(l.acCount)||0),0);
  const sumK    = arr => arr.reduce((s,l)=>s+(parseFloat(l.kwhr)||0),0);
  const nowT    = () => { const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; };

  const Ico = {
    Refresh:({cls=''})=><svg className={cls} width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h5M20 20v-5h-5M15.24 15.24A8 8 0 1118 12"/></svg>,
    Trash:  ()=><svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>,
    Edit:   ()=><svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg>,
    Leaf:   ()=><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>,
    Bolt:   ()=><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z"/></svg>,
    Check:  ()=><svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="3"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>,
    Close:  ()=><svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="3"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>,
    Cog:    ()=><svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>,
  };

  const Stepper = ({ value, onChange, size='md' }) => {
    const n=parseInt(value)||0, h=size==='sm'?28:34, w=size==='sm'?26:30;
    return (
      <div className="stepper">
        <button type="button" className="step-btn" style={{width:w,height:h}} onClick={()=>onChange(Math.max(0,n-1))}>−</button>
        <input type="number" className="step-input" style={{height:h}} value={value}
          onChange={e=>{const v=parseInt(e.target.value);onChange(isNaN(v)?0:Math.max(0,Math.min(99,v)));}}
          onBlur={e=>{if(e.target.value==='')onChange(0);}}/>
        <button type="button" className="step-btn" style={{width:w,height:h}} onClick={()=>onChange(Math.min(99,n+1))}>+</button>
      </div>
    );
  };

  const EnergySavings = ({ units, scope, billingLabel }) => {
    const kwh  = units * KWH_PER_UNIT;
    const cost = kwh * PHP_KWH;
    const bench = scope==='day'?20:400;
    const pct   = Math.min((units/bench)*100,100);
    return (
      <div className="energy-panel">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:13}}>
          <div style={{display:'flex',alignItems:'center',gap:7}}>
            <span style={{color:'var(--green)'}}><Ico.Leaf/></span>
            <span className="f-disp" style={{fontSize:13,fontWeight:800,fontStyle:'italic',color:'var(--green)',letterSpacing:'.06em',textTransform:'uppercase'}}>Energy Saved</span>
          </div>
          <span className="f-mono" style={{fontSize:9,color:'white',textTransform:'uppercase',letterSpacing:'.1em'}}>{scope==='day'?'Today':(billingLabel||'This Period')}</span>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:7}}>
            <span className="f-disp" style={{fontSize:42,fontWeight:800,color:'var(--green)',lineHeight:1}}>{units}</span>
            <div>
              <p style={{fontSize:11,color:'var(--txt2)',margin:0,fontWeight:600}}>AC units off</p>
              <p className="f-mono" style={{fontSize:9,color:'var(--txt3)',margin:0}}>× {AC_WATTS}W × {AC_HRS}h ÷ 1000 = {KWH_PER_UNIT} kWhr/unit</p>
            </div>
          </div>
          <div className="ebar-track"><div className="ebar-fill" style={{width:`${pct}%`}}/></div>
          <p style={{fontSize:9,color:'var(--txt3)',marginTop:4,textAlign:'right'}}>
            {units===0?'No shutdowns yet':`${pct.toFixed(0)}% of ${bench}-unit target`}
          </p>
        </div>
        {units > 0 ? (<>
          <div style={{background:'var(--green-dim)',border:'1px solid rgba(0,229,160,.2)',borderRadius:9,padding:'11px 13px',marginBottom:8,textAlign:'center'}}>
            <p style={{fontSize:8,fontWeight:700,color:'var(--green)',textTransform:'uppercase',letterSpacing:'.15em',margin:'0 0 2px'}}>★ Estimated Savings</p>
            <p className="f-disp" style={{fontSize:28,fontWeight:800,color:'var(--green)',margin:0,lineHeight:1.1}}>
              {f2(kwh)} <span style={{fontSize:13}}>kWhr</span>
            </p>
            <p style={{fontSize:10,color:'var(--txt2)',marginTop:3}}>{AC_WATTS}W × {AC_HRS}h × {units} unit{units!==1?'s':''} ÷ 1000</p>
          </div>
          <div style={{background:'var(--amber-dim)',border:'1px solid rgba(255,184,0,.2)',borderRadius:9,padding:'9px 13px',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div>
              <p style={{fontSize:8,fontWeight:700,color:'var(--amber)',textTransform:'uppercase',letterSpacing:'.1em',margin:'0 0 1px'}}>Est. Cost Saved</p>
              <p className="f-disp" style={{fontSize:21,fontWeight:800,color:'var(--amber)',margin:0,lineHeight:1.1}}>{fP(cost)}</p>
            </div>
            <div style={{textAlign:'right'}}>
              <p className="f-mono" style={{fontSize:10,color:'var(--txt2)',margin:0}}>₱{PHP_KWH}/kWhr</p>
              <p style={{fontSize:8,color:'var(--txt3)',margin:0}}>Meralco avg</p>
            </div>
          </div>
          <div style={{borderTop:'1px solid var(--border)',paddingTop:7}}>
            <p className="f-mono" style={{fontSize:8,color:'var(--txt3)',lineHeight:1.8,margin:0}}>
              {KWH_PER_UNIT} kWhr per unit · {fP(KWH_PER_UNIT*PHP_KWH)} per unit<br/>
              {AC_WATTS}W per unit · off for {AC_HRS}h · ÷1000 = kWhr
            </p>
          </div>
        </>) : (
          <p style={{fontSize:11,color:'var(--txt3)',fontStyle:'italic',textAlign:'center',padding:'10px 0'}}>Log shutdowns to see savings</p>
        )}
      </div>
    );
  };

  const blankForm = () => ({ time:nowT(), acCount:0, location:'', staff:'', tech:'', remarks:'' });

  const App = () => {
    const [selDate,    setSelDate]    = useState(new Date());
    const [curMonth,   setCurMonth]   = useState(new Date());
    const [logs,       setLogs]       = useState([]);
    const [loading,    setLoading]    = useState(false);
    const [editId,     setEditId]     = useState(null);
    const [savingId,   setSavingId]   = useState(null);
    const [eScope,     setEScope]     = useState('day');
    const [form,       setForm]       = useState(blankForm());
    const [syncMsg,    setSyncMsg]    = useState('');
    const [syncOk,     setSyncOk]     = useState(true);

    const dk = dateKey(selDate);
    const msg = (m,ok=true)=>{ setSyncMsg(m); setSyncOk(ok); setTimeout(()=>setSyncMsg(''),4000); };

    const fetchData = async () => {
      const u=APPS_SCRIPT_URL;
      if(!u){ msg('No Apps Script URL set. Open the file and paste your URL into APPS_SCRIPT_URL.',false); return; }
      setLoading(true);
      try {
        const r=await fetch(u+'?action=get',{redirect:'follow'});
        const text=await r.text();
        const d=JSON.parse(text);
        if(d.status==='ok'){
          const rows=(d.rows||[]).filter(l=>l.date&&l.date.trim()!=='');
          // Deduplicate: drop local ID- entries whose content now exists in Sheets
          const fp=l=>`${l.date}|${l.time}|${l.location}|${l.acCount}|${l.staff}|${l.tech}`;
          const sheetsFP=new Set(rows.map(fp));
          const cached=JSON.parse(localStorage.getItem(CACHE_KEY)||'[]');
          const localOnly=cached.filter(l=>l.id&&l.id.startsWith('ID-')&&!sheetsFP.has(fp(l)));
          const merged=[...rows,...localOnly];
          localStorage.setItem(CACHE_KEY,JSON.stringify(merged));
          setLogs(merged);
          msg(`Synced ${rows.length} records.`);
        } else { msg('Sheets error: '+(d.message||'Unknown'),false); }
      } catch(e) {
        const c=localStorage.getItem(CACHE_KEY);
        if(c){ setLogs(JSON.parse(c)); msg('Using cached data (offline).',false); }
        else msg('Could not reach Apps Script.',false);
      } finally { setLoading(false); }
    };

    useEffect(()=>{
      // On load, immediately restore from cache so entries are visible before fetch completes
      const c=localStorage.getItem(CACHE_KEY);
      if(c){ try{ setLogs(JSON.parse(c)); }catch(_){} }
      if(APPS_SCRIPT_URL) fetchData();
    },[]);

    const push = async (payload) => {
      if(!APPS_SCRIPT_URL) return;
      try { await fetch(APPS_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)}); }
      catch(e){ console.error('[AC Monitor] Push failed:',e); }
    };

    // Helper: update state AND persist to cache atomically
    const mutateLogs = (updater) => {
      setLogs(prev => {
        const next = updater(prev);
        localStorage.setItem(CACHE_KEY, JSON.stringify(next));
        return next;
      });
    };

    const addLog = () => {
      if(!form.location) return;
      const kwhr=f2((parseInt(form.acCount)||0)*KWH_PER_UNIT);
      const entry={id:'ID-'+Date.now(),date:dk,time:form.time,location:form.location,acCount:parseInt(form.acCount)||0,kwhr,staff:form.staff,tech:form.tech,remarks:form.remarks};
      mutateLogs(p=>[...p,entry]);
      setForm(blankForm());
      push({action:'add',...entry});
    };

    const startEdit = log => { setEditId(log.id); setForm({time:log.time||nowT(),acCount:parseInt(log.acCount)||0,location:log.location||'',staff:log.staff||'',tech:log.tech||'',remarks:log.remarks||''}); };
    const cancelEdit = () => { setEditId(null); setForm(blankForm()); };
    const saveEdit = () => {
      const kwhr=f2((parseInt(form.acCount)||0)*KWH_PER_UNIT);
      const updated={id:editId,date:logs.find(l=>l.id===editId)?.date||dk,time:form.time,location:form.location,acCount:parseInt(form.acCount)||0,kwhr,staff:form.staff,tech:form.tech,remarks:form.remarks};
      mutateLogs(p=>p.map(l=>l.id===editId?updated:l));
      setSavingId(editId); setEditId(null); setForm(blankForm());
      push({action:'add',...updated}).then(()=>setSavingId(null));
    };
    const deleteLog = id => {
      if(!confirm('Delete this entry?')) return;
      mutateLogs(p=>p.filter(l=>l.id!==id));
      push({action:'delete',id});
    };

    const dayLogs = useMemo(()=>logs.filter(l=>l.date&&l.date.toString().split('T')[0].trim()===dk).sort((a,b)=>(a.time||'').localeCompare(b.time||'')),[logs,dk]);

    // ─── BILLING PERIOD SETTINGS ──────────────────────────────
    // To change the monthly period, edit the two numbers below:
    //   BILLING_START_DAY — the day the period begins (current month)
    //   BILLING_END_DAY   — the day the period ends   (following month)
    // Example: 16 → 15 means "16th of this month to 15th of next month"
    const BILLING_START_DAY = 26;
    const BILLING_END_DAY   = 25;
    // ──────────────────────────────────────────────────────────

    const billingStart = useMemo(()=>{ const d=new Date(curMonth.getFullYear(),curMonth.getMonth()-1,BILLING_START_DAY); return dateKey(d); },[curMonth]);
    const billingEnd   = useMemo(()=>{ const d=new Date(curMonth.getFullYear(),curMonth.getMonth(),BILLING_END_DAY); return dateKey(d); },[curMonth]);
    const billingLabel = useMemo(()=>{
      const s=new Date(curMonth.getFullYear(),curMonth.getMonth()-1,BILLING_START_DAY);
      const e=new Date(curMonth.getFullYear(),curMonth.getMonth(),BILLING_END_DAY);
      const fmt={month:'short',day:'numeric'};
      return s.toLocaleDateString('en-PH',fmt)+' – '+e.toLocaleDateString('en-PH',{...fmt,year:'numeric'});
    },[curMonth]);

    const monthLogs = useMemo(()=>logs.filter(l=>{
      if(!l.date) return false;
      const c=l.date.toString().split('T')[0].trim();
      return c>=billingStart && c<=billingEnd;
    }),[logs,billingStart,billingEnd]);

    const dayUnits=sumU(dayLogs), monthUnits=sumU(monthLogs);
    const dayKwh=sumK(dayLogs),   monthKwh=sumK(monthLogs);

    const dim=new Date(curMonth.getFullYear(),curMonth.getMonth()+1,0).getDate();
    const fd=new Date(curMonth.getFullYear(),curMonth.getMonth(),1).getDay();
    const calDays=[...Array(fd).fill(null),...Array.from({length:dim},(_,i)=>i+1)];

    const entryKwh  = f2((parseInt(form.acCount)||0)*KWH_PER_UNIT);
    const entryCost = fP((parseInt(form.acCount)||0)*KWH_PER_UNIT*PHP_KWH);

    return (
      <div>
        {/* Header */}
        <header style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',paddingBottom:20,marginBottom:22,borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <div style={{width:42,height:42,borderRadius:10,background:'var(--cyan)',display:'flex',alignItems:'center',justifyContent:'center',color:'#000',boxShadow:'0 0 20px var(--cyan-glow)',flexShrink:0}}>
              <Ico.Bolt/>
            </div>
            <div>
              <h1 className="f-disp" style={{fontSize:32,fontWeight:800,fontStyle:'italic',letterSpacing:'-.01em',color:'var(--txt1)',lineHeight:1,margin:0}}>
                ENERCON <span style={{color:'var(--cyan)'}}>TRACKER</span>
              </h1>
              <p className="f-mono" style={{fontSize:8,color:'white',letterSpacing:'.22em',textTransform:'uppercase',marginTop:4}}>
                FACILITIES MANAGEMENT · THE LINK
              </p>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div className="status-pill"><span className="dot-pulse"/><span>{APPS_SCRIPT_URL?'Sheets Linked':'No URL Set'}</span></div>
          </div>
        </header>

        {/* Main grid */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 280px',gap:14}}>

          {/* LEFT */}
          <div className="panel" style={{padding:22,display:'flex',flexDirection:'column',gap:18,minHeight:620}}>

            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <h2 className="f-disp" style={{fontSize:24,fontWeight:800,fontStyle:'italic',color:'var(--txt1)',margin:0,lineHeight:1.1}}>
                  {selDate.toLocaleDateString('en-PH',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}
                </h2>
                <p className="f-mono" style={{fontSize:10,color:loading?'var(--cyan)':'var(--txt3)',marginTop:5,letterSpacing:'.08em',textTransform:'uppercase'}}>
                  {loading?'⟳  Syncing Google Sheets…':`● ${dayLogs.length} log${dayLogs.length!==1?'s':''} · ${dayUnits} unit${dayUnits!==1?'s':''} off · ${f2(dayKwh)} kWhr saved`}
                </p>
              </div>
              <button className="btn-icon" onClick={()=>fetchData()} title="Refresh"><Ico.Refresh cls={loading?'spin':''}/></button>
            </div>

            {syncMsg&&<p className="f-mono fade-in" style={{fontSize:10,color:syncOk?'var(--green)':'var(--red)',letterSpacing:'.05em'}}>{syncMsg}</p>}

            {editId&&(
              <div className="edit-bar">
                <Ico.Edit/>
                <span style={{fontSize:12,color:'var(--cyan)',fontWeight:600}}>Editing entry — adjust fields below, then press <strong>Update</strong></span>
                <button className="btn btn-ghost" style={{marginLeft:'auto',padding:'4px 10px',fontSize:11}} onClick={cancelEdit}><Ico.Close/> Cancel</button>
              </div>
            )}

            <div className="accent-bar"/>

            {/* Log list */}
            <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:7,minHeight:240,paddingRight:3}}>
              {dayLogs.length>0 ? dayLogs.map((log,i)=>{
                const acN=parseInt(log.acCount)||0;
                const onTime=fT(log.time,AC_HRS);
                const eKwh=f2(acN*KWH_PER_UNIT);
                const ePeso=fP(acN*KWH_PER_UNIT*PHP_KWH);
                const isSave=savingId===log.id, isEdit=editId===log.id;
                return (
                  <div key={log.id} className={`log-row fade-in ${isEdit?'editing':''}`} style={{animationDelay:`${i*.04}s`}}>
                    <span className="f-mono badge badge-cyan" style={{fontSize:13,padding:'4px 10px',flexShrink:0}}>{log.time}</span>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,flexShrink:0}}>
                      <div style={{width:6,height:6,borderRadius:'50%',background:'var(--red)',boxShadow:'0 0 5px rgba(255,69,96,.7)'}}/>
                      <div style={{width:1,height:12,background:'var(--border)'}}/>
                      <div style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',opacity:.55,boxShadow:'0 0 5px rgba(0,229,160,.5)'}}/>
                    </div>
                    <div style={{flexShrink:0}}>
                      <p className="f-mono" style={{fontSize:8,color:'var(--red)',fontWeight:700,letterSpacing:'.04em',margin:0}}>OFF {log.time}</p>
                      <p className="f-mono" style={{fontSize:8,color:'var(--green)',fontWeight:700,letterSpacing:'.04em',margin:'1px 0 0',opacity:.75}}>ON ~{onTime}</p>
                    </div>
                    {isSave?<span className="badge badge-cyan shimmer" style={{flexShrink:0}}>…</span>:(
                      <span className="badge badge-cyan" style={{flexShrink:0,fontSize:13,padding:'4px 10px'}}>
                        {acN} <span style={{fontSize:9,marginLeft:3,opacity:.7}}>unit{acN!==1?'s':''}</span>
                      </span>
                    )}
                    <div style={{flex:1,minWidth:0}}>
                      <p className="f-disp" style={{fontSize:14,fontWeight:700,color:'var(--txt1)',margin:0,textTransform:'uppercase',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',letterSpacing:'-.01em'}}>{log.location}</p>
                      <p style={{fontSize:11,color:'var(--txt2)',margin:'1px 0 0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {log.staff}{log.tech?` · ${log.tech}`:''}{log.remarks?` — ${log.remarks}`:''}
                      </p>
                    </div>
                    {acN>0&&(
                      <div style={{flexShrink:0,background:'var(--green-dim)',border:'1px solid rgba(0,229,160,.18)',borderRadius:7,padding:'4px 9px',textAlign:'center',minWidth:72}}>
                        <p style={{fontSize:7,color:'var(--green)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',margin:0}}>saved</p>
                        <p className="f-disp" style={{fontSize:13,fontWeight:700,color:'var(--green)',margin:0,lineHeight:1.2}}>{eKwh} kWhr</p>
                        <p style={{fontSize:8,color:'var(--txt3)',margin:0}}>{ePeso}</p>
                      </div>
                    )}
                    <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:1,borderLeft:'1px solid var(--border)',paddingLeft:10,flexShrink:0}}>
                      <span style={{fontSize:11,fontWeight:600,color:'var(--cyan)',whiteSpace:'nowrap'}}>{log.staff||'—'}</span>
                      <span className="f-mono" style={{fontSize:8,color:'var(--green)',textTransform:'uppercase',letterSpacing:'.06em'}}>{log.tech||'—'}</span>
                    </div>
                    <div style={{display:'flex',gap:5,flexShrink:0}}>
                      <button className="btn-icon" onClick={()=>startEdit(log)} title="Edit"><Ico.Edit/></button>
                      <button className="btn-icon del" onClick={()=>deleteLog(log.id)} title="Delete"><Ico.Trash/></button>
                    </div>
                  </div>
                );
              }):(
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,padding:'60px 20px',color:'var(--txt3)'}}>
                  <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.5">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z"/>
                  </svg>
                  <p className="f-disp" style={{fontSize:12,fontWeight:700,letterSpacing:'.15em',textTransform:'uppercase',fontStyle:'italic'}}>No activity recorded</p>
                  <p style={{fontSize:11}}>Add a log entry below</p>
                </div>
              )}
            </div>

            {/* Form */}
            <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:11,padding:13}}>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:11,paddingBottom:11,borderBottom:'1px solid var(--border)'}}>
                <div>
                  <p style={{fontSize:8,fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.12em',margin:'0 0 5px'}}>AC Units Off</p>
                  <Stepper value={form.acCount} onChange={v=>setForm({...form,acCount:v})}/>
                </div>
                <div style={{flex:1,background:'var(--green-dim)',border:'1px solid rgba(0,229,160,.18)',borderRadius:8,padding:'8px 12px'}}>
                  <p style={{fontSize:8,color:'var(--green)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',margin:'0 0 1px'}}>
                    {editId?'Updated entry will save':'This entry will save'}
                  </p>
                  <p className="f-disp" style={{fontSize:17,fontWeight:800,color:'var(--green)',margin:0,lineHeight:1}}>{entryKwh} kWhr</p>
                  <p style={{fontSize:10,color:'var(--txt2)',margin:'2px 0 0'}}>≈ {entryCost} · {parseInt(form.acCount)||0} unit{(parseInt(form.acCount)||0)!==1?'s':''} × {AC_WATTS}W × {AC_HRS}h</p>
                </div>
              </div>
              <div className="form-grid">
                <input type="time" className="field f-mono" style={{fontSize:13}} value={form.time} onChange={e=>setForm({...form,time:e.target.value})}/>
                <select className="field" value={form.location} onChange={e=>setForm({...form,location:e.target.value})}>
                  <option value="">Floor *</option>
                  {FLOORS.map(f=><option key={f} value={f}>{f}</option>)}
                </select>
                <Stepper value={form.acCount} onChange={v=>setForm({...form,acCount:v})} size="sm"/>
                <input type="text" className="field" placeholder="Facilities Staff" value={form.staff} onChange={e=>setForm({...form,staff:e.target.value})}/>
                <input type="text" className="field" placeholder="Technician" value={form.tech} onChange={e=>setForm({...form,tech:e.target.value})}/>
                <input type="text" className="field" placeholder="Remarks" value={form.remarks} onChange={e=>setForm({...form,remarks:e.target.value})}/>
                {editId?(
                  <div style={{display:'flex',gap:5}}>
                    <button className="btn btn-green" style={{flex:1}} onClick={saveEdit}><Ico.Check/> Update</button>
                    <button className="btn btn-ghost" onClick={cancelEdit}><Ico.Close/></button>
                  </div>
                ):(
                  <button className="btn btn-cyan" type="button" onClick={addLog}>+ Log</button>
                )}
              </div>
            </div>
          </div>

          {/* RIGHT */}
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
              <div className="stat-card">
                <p style={{fontSize:9,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.1em',margin:'0 0 4px'}}>Today</p>
                <p className="f-disp" style={{fontSize:28,fontWeight:800,color:'var(--cyan)',margin:0,lineHeight:1}}>{dayUnits}</p>
                <p style={{fontSize:9,color:'var(--txt3)',marginTop:3}}>AC units off</p>
                <p style={{fontSize:9,color:'var(--green)',marginTop:1}}>{f2(dayKwh)} kWhr</p>
              </div>
              <div className="stat-card">
                <p style={{fontSize:9,fontWeight:600,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.1em',margin:'0 0 4px'}}>Month</p>
                <p className="f-disp" style={{fontSize:28,fontWeight:800,color:'var(--green)',margin:0,lineHeight:1}}>{monthUnits}</p>
                <p style={{fontSize:9,color:'var(--txt3)',marginTop:3}}>AC units off</p>
                <p style={{fontSize:9,color:'var(--green)',marginTop:1}}>{f2(monthKwh)} kWhr</p>
              </div>
            </div>

            <div>
              <div style={{display:'flex',gap:5,marginBottom:7}}>
                <button className={`tab ${eScope==='day'?'on':''}`} onClick={()=>setEScope('day')}>Daily</button>
                <button className={`tab ${eScope==='month'?'on':''}`} onClick={()=>setEScope('month')}>Monthly</button>
              </div>
              <EnergySavings units={eScope==='day'?dayUnits:monthUnits} scope={eScope} billingLabel={billingLabel}/>
            </div>

            <div className="panel" style={{padding:15}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:11}}>
                <button className="btn-icon" style={{width:26,height:26}} onClick={()=>setCurMonth(new Date(curMonth.getFullYear(),curMonth.getMonth()-1,1))}>
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <p className="f-disp" style={{fontSize:12,fontWeight:700,color:'var(--txt1)',fontStyle:'italic',textTransform:'uppercase',letterSpacing:'.05em',margin:0}}>
                  {curMonth.toLocaleString('default',{month:'long',year:'numeric'})}
                </p>
                <button className="btn-icon" style={{width:26,height:26}} onClick={()=>setCurMonth(new Date(curMonth.getFullYear(),curMonth.getMonth()+1,1))}>
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M9 18l6-6-6-6"/></svg>
                </button>
              </div>
              <div className="cal-grid" style={{marginBottom:5}}>
                {['S','M','T','W','T','F','S'].map((d,i)=>(
                  <div key={i} style={{textAlign:'center',fontSize:8,fontWeight:700,color:'var(--txt3)',padding:'3px 0',letterSpacing:'.05em'}}>{d}</div>
                ))}
              </div>
              <div className="cal-grid">
                {calDays.map((day,i)=>{
                  const d=day?new Date(curMonth.getFullYear(),curMonth.getMonth(),day):null;
                  const k=d?dateKey(d):null;
                  const sel=k===dk;
                  const has=k&&logs.some(l=>l.date&&l.date.toString().split('T')[0]===k);
                  return (
                    <div key={i} className={`cal-day ${sel?'sel':''}`}
                      onClick={()=>{ if(day){ setSelDate(d); setEditId(null); }}}
                      style={{cursor:day?'pointer':'default'}}>
                      {day&&<span>{day}</span>}
                      {has&&day&&<div className="cal-dot"/>}
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{padding:'10px 12px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:9}}>
              <p className="f-mono" style={{fontSize:8,color:'var(--txt3)',lineHeight:1.8,margin:0}}>
                <span style={{color:'var(--txt2)',fontWeight:700}}>Sheets columns (A→H):</span><br/>
                date · time · location · acCount · kwhr · <span style={{color:'var(--cyan)'}}>staff</span> · tech · remarks<br/>
                <span style={{color:'var(--cyan)'}}>action=add</span> → appendRow &nbsp;|&nbsp; <span style={{color:'var(--red)'}}>action=delete</span> → deleteRow
              </p>
            </div>
          </div>
        </div>
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
